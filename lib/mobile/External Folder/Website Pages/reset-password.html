<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reset Password – ETA Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --primary: #0FD9C5;
  --primary-glow: rgba(15,217,197,0.4);
  --bg-dark: #062A2F;
  --bg-darker: #0E1618;
  --glass-bg: rgba(255,255,255,0.05);
  --glass-border: rgba(15,217,197,0.2);
  --text-main: #ffffff;
  --text-secondary: rgba(255,255,255,0.75);
  --error: #ff6b6b;
  --success: #4cd964;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg,var(--bg-dark),var(--bg-darker));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-main);
  padding: 2rem 1rem;
}

/* ===== Layout ===== */
.wrapper {
  width: 100%;
  max-width: 460px;
}

/* ===== Glass Card ===== */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  border-radius: 24px;
  border: 1px solid var(--glass-border);
  padding: clamp(28px, 5vw, 40px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
}

/* ===== Headings ===== */
h1 {
  text-align: center;
  font-size: clamp(24px, 5vw, 30px);
  color: var(--primary);
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  color: var(--text-secondary);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 28px;
}

/* ===== Form ===== */
label {
  display: block;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--text-secondary);
}

input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.12);
  color: #ffffff; /* ✅ password text is white */
  -webkit-text-fill-color: #ffffff; /* ✅ FIX */
  caret-color: #ffffff;             /* ✅ FIX */
  font-size: 15px;
  outline: none;
  transition: border 0.2s, box-shadow 0.2s;
}

input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 1px var(--primary-glow);
}

.field {
  margin-bottom: 18px;
}

/* ===== Button ===== */
button {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  background: var(--primary);
  color: #022;
  font-weight: 700;
  font-size: 15px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 10px 28px var(--primary-glow);
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 14px 36px var(--primary-glow);
}

button:disabled {
  opacity: 0.6;
  cursor: default;
  transform: none;
  box-shadow: none;
}

/* ===== Status ===== */
.status {
  min-height: 20px;
  margin-top: 14px;
  font-size: 14px;
  text-align: center;
}

.status.error { color: var(--error); }
.status.success { color: var(--success); }

/* ===== Footer ===== */
.meta {
  text-align: center;
  margin-top: 26px;
  font-size: 13px;
  color: var(--text-secondary);
}

.meta a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}

.meta a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="glass-card">

    <!-- ✅ Logo removed -->

    <h1>Reset Your Password</h1>
    <div class="subtitle">
      Choose a new password for your ETA Network account.
      Once updated, you can sign in again in the app.
    </div>

    <form id="resetForm">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" minlength="8" required />
      </div>

      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" minlength="8" required />
      </div>

      <button type="submit" id="submitBtn">Update password</button>
      <div id="status" class="status"></div>
    </form>

    <div class="meta">
      Having trouble?
      <a href="mailto:support@your-domain.com">Contact support</a>
    </div>

  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBdVZ48BWKKXG7Xc1e97mKyKcssHIF2fz0",
  authDomain: "eta-network-31964.firebaseapp.com",
  projectId: "eta-network-31964",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const params = new URLSearchParams(window.location.search);
const oobCode = params.get("oobCode");
const mode = params.get("mode");

const form = document.getElementById("resetForm");
const statusEl = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  statusEl.textContent = "";
  statusEl.className = "status";

  if (!oobCode || mode !== "resetPassword") {
    statusEl.textContent = "Invalid or expired reset link.";
    statusEl.classList.add("error");
    return;
  }

  const pw = password.value.trim();
  const confirm = document.getElementById("confirm").value.trim();

  if (pw.length < 8) {
    statusEl.textContent = "Password must be at least 8 characters.";
    statusEl.classList.add("error");
    return;
  }

  if (pw !== confirm) {
    statusEl.textContent = "Passwords do not match.";
    statusEl.classList.add("error");
    return;
  }

  submitBtn.disabled = true;

  try {
    await auth.confirmPasswordReset(oobCode, pw);
    statusEl.textContent = "Password updated successfully. You may now sign in.";
    statusEl.classList.add("success");
  } catch {
    statusEl.textContent = "Unable to reset password. The link may have expired.";
    statusEl.classList.add("error");
  } finally {
    submitBtn.disabled = false;
  }
});
</script>

</body>
</html>
